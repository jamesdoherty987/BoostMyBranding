# Render Blueprint — deploys the BoostMyBranding API + managed Postgres.
# Apply once with Render Dashboard → Blueprints → New Blueprint → select this repo.
# https://render.com/docs/blueprint-spec
#
# What this provisions:
#   1. A managed Postgres database (free tier — upgrade to "starter" when going live).
#   2. The Express API web service at apps/api, wired to the DB.
#   3. A pre-deploy step that runs drizzle migrations automatically on every deploy.
#
# Frontends (web, portal, dashboard) are best deployed on Vercel — one import per
# app with root directory set to apps/web, apps/portal, apps/dashboard respectively.

databases:
  - name: boostmybranding-db
    databaseName: boostmybranding
    plan: free
    postgresMajorVersion: '16'
    # ipAllowList: []    # uncomment and add IPs if you want external access locked down

services:
  - type: web
    name: boostmybranding-api
    runtime: node
    plan: free               # bump to "starter" or higher for production traffic
    region: frankfurt        # change to oregon / virginia / singapore as needed
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm install --frozen-lockfile && pnpm --filter api build
    # Runs BEFORE traffic is routed to the new instance — safe place for migrations.
    preDeployCommand: corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm db:migrate
    startCommand: pnpm --filter api start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: '10000'       # Render injects $PORT; API_PORT is our own alias (see below)
      - key: PORT
        value: '10000'

      # --- Auto-wired from the managed DB ---
      - key: DATABASE_URL
        fromDatabase:
          name: boostmybranding-db
          property: connectionString

      # --- Auto-generated secret (32 hex chars) ---
      - key: AUTH_SECRET
        generateValue: true

      # --- Public URLs (update once you've set up Vercel domains) ---
      - key: APP_URL
        value: https://boostmybranding.com
      - key: PORTAL_URL
        value: https://app.boostmybranding.com
      - key: DASHBOARD_URL
        value: https://team.boostmybranding.com

      # --- Fill these in the Render dashboard after first deploy ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SOCIAL
        sync: false
      - key: STRIPE_PRICE_WEBSITE
        sync: false
      - key: STRIPE_PRICE_FULL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: contact@boostmybranding.com
      - key: CONTENTSTUDIO_API_KEY
        sync: false
      - key: CONTENTSTUDIO_WORKSPACE_ID
        sync: false
      - key: CRON_SECRET
        generateValue: true

  # Belt-and-braces cron that also hits the publish endpoint each minute,
  # in case the in-process node-cron ever stalls (e.g. after a cold start).
  - type: cron
    name: boostmybranding-publish-due
    runtime: node
    plan: free
    schedule: '*/1 * * * *'
    rootDir: .
    buildCommand: 'true'
    startCommand: |
      node -e "fetch(process.env.API_URL + '/api/v1/automation/publish-due', { method: 'POST', headers: { 'x-cron-secret': process.env.CRON_SECRET }}).then(r=>r.text()).then(console.log).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: boostmybranding-api
          property: host
      - key: CRON_SECRET
        fromService:
          type: web
          name: boostmybranding-api
          envVarKey: CRON_SECRET
